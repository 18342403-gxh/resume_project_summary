# 使用原则
principles:
  - 每段描述最多使用 2-3 个包装词，避免堆砌
  - 包装词必须与实际技术/业务匹配，不可无中生有
  - 优先使用能被追问时自圆其说的词
  - 面试时能展开讲 2-3 分钟的内容才值得写
